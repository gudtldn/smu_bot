services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: smu-bot:latest
    container_name: smu-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
